<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steel Vanguard - Heat Mechanics</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0c;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-shadow: 2px 2px 0 #000;
        }
        h1 {
            margin: 0 0 5px 0;
            font-size: 24px;
            color: #7ca8d9;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p { margin: 0; font-size: 14px; color: #aaa; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>Steel Vanguard</h1>
        <p>Movement: <b>W A S D</b> | Aim: <b>Mouse</b> | Minigun: <b>Left Click</b></p>
        <p style="color: #00ffff; margin-top: 5px;">Tactical: Release weapon at <b>90%+ heat (Cyan)</b> to build Barrage Charges (4 required).</p>
        <p style="color: #ff3333; margin-top: 5px;">Warning: Hitting 100% heat locks weapon and resets charges!</p>
        <p id="score-display" style="margin-top: 10px; font-size: 18px; color: #ffcc00;">Kills: 0</p>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('score-display');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- SPRITE GENERATION ---
    function generateTankSprite(hullColor, accentColor) {
        const offscreen = document.createElement('canvas');
        offscreen.width = 64;
        offscreen.height = 64;
        const c = offscreen.getContext('2d');

        // Tracks
        c.fillStyle = '#1a1a1a';
        c.fillRect(8, 6, 48, 14);
        c.fillRect(8, 44, 48, 14);
        
        // Treads
        c.fillStyle = '#0a0a0a';
        for(let i = 10; i < 54; i += 6) {
            c.fillRect(i, 6, 4, 14);
            c.fillRect(i, 44, 4, 14);
        }

        // Hull
        c.fillStyle = hullColor;
        c.fillRect(14, 14, 36, 36);
        
        // Armor
        c.fillStyle = accentColor;
        c.fillRect(20, 20, 24, 24);
        c.strokeStyle = '#000';
        c.lineWidth = 2;
        c.strokeRect(14, 14, 36, 36);

        // Turret
        c.fillStyle = '#333';
        c.beginPath();
        c.arc(32, 32, 14, 0, Math.PI * 2);
        c.fill();
        c.stroke();

        // Minigun Barrels
        c.fillStyle = '#111';
        c.fillRect(32, 26, 28, 4);
        c.fillRect(32, 34, 28, 4);
        c.fillStyle = '#222';
        c.fillRect(32, 30, 30, 4);

        return offscreen;
    }

    const playerSprite = generateTankSprite('#5a7282', '#3e515e');
    const enemySprite = generateTankSprite('#825a5a', '#5e3e3e');

    // --- GAME STATE ---
    let score = 0;
    const keys = {};
    const mouse = { x: canvas.width/2, y: canvas.height/2, down: false };

    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mousedown', e => { if(e.button === 0) mouse.down = true; });
    window.addEventListener('mouseup', e => { 
        if(e.button === 0) {
            if(!player.overheated) {
                handleChargeRelease();
            }
            mouse.down = false; 
        }
    });

    // Entities
    const bullets = [];
    const enemyBullets = [];
    const enemies = [];
    const particles = [];
    const missiles = [];

    // Player Object
    const player = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        speed: 3,
        angle: 0,
        lastShot: 0,
        fireRate: 80,
        hp: 10,
        maxHp: 10,
        
        // Heat & Charge Mechanics
        heat: 0,
        overheated: false,
        cooldownTimer: 0,
        burstCount: 0  // Need 4 for a barrage
    };

    // --- GAME FUNCTIONS ---

    function spawnEnemy() {
        let ex, ey;
        if (Math.random() < 0.5) {
            ex = Math.random() < 0.5 ? -50 : canvas.width + 50;
            ey = Math.random() * canvas.height;
        } else {
            ex = Math.random() * canvas.width;
            ey = Math.random() < 0.5 ? -50 : canvas.height + 50;
        }

        enemies.push({
            x: ex, y: ey,
            speed: 1.5 + Math.random() * 0.5,
            hp: 3,
            angle: 0,
            lastShot: Date.now() + Math.random() * 2000,
            fireRate: 1800
        });
    }

    setInterval(spawnEnemy, 1500);

    function createExplosion(x, y, color) {
        for(let i=0; i<15; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 8,
                vy: (Math.random() - 0.5) * 8,
                life: 1.0,
                color: color
            });
        }
    }

    function handleChargeRelease() {
        // Must hit 90% heat to gain a charge portion
        if (player.heat >= 90 && player.heat < 100) {
            player.burstCount++;
            createExplosion(player.x, player.y, '#00ffff'); 

            // 4 Successful Heat-ups triggers the barrage
            if (player.burstCount >= 4) {
                player.burstCount = 0; 
                fireMissileBarrage(); 
            }
        }
        
        if (!player.overheated) {
            player.heat = 0;
        }
    }

    function fireMissileBarrage() {
        for (let i = 0; i < enemies.length; i++) {
            const bloomAngle = player.angle + (Math.random() - 0.5) * Math.PI;
            
            missiles.push({
                x: player.x,
                y: player.y,
                vx: Math.cos(bloomAngle) * 4,
                vy: Math.sin(bloomAngle) * 4,
                speed: 8,
                angle: bloomAngle,
                target: enemies[i],
                life: 200,
                activeDelay: 10 
            });
        }
        
        for(let i=0; i<30; i++) {
            createExplosion(player.x, player.y, '#ff8800');
        }
    }

    function update() {
        const now = Date.now();

        // 1. Player Movement
        let dx = 0, dy = 0;
        if (keys['w']) dy -= 1;
        if (keys['s']) dy += 1;
        if (keys['a']) dx -= 1;
        if (keys['d']) dx += 1;

        if (dx !== 0 && dy !== 0) {
            const length = Math.sqrt(dx*dx + dy*dy);
            dx /= length; dy /= length;
        }

        player.x += dx * player.speed;
        player.y += dy * player.speed;
        player.x = Math.max(32, Math.min(canvas.width - 32, player.x));
        player.y = Math.max(32, Math.min(canvas.height - 32, player.y));
        player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

        // 2. Overheat Logic
        if (player.overheated) {
            player.cooldownTimer -= 16.67; 
            if (player.cooldownTimer <= 0) {
                player.overheated = false;
                player.heat = 0; 
            }
        }

        // 3. Player Shooting & Heat Buildup
        if (mouse.down && !player.overheated) {
            // ~60 FPS. 100 / 180 frames = ~0.555 per frame. 
            // Takes exactly 3 continuous seconds of firing to hit 100 heat.
            player.heat += 0.555; 
            
            if (player.heat >= 100) {
                player.heat = 100;
                player.overheated = true;
                player.cooldownTimer = 3000; 
                player.burstCount = 0; // Penalty: Lose charges if you overheat
                createExplosion(player.x, player.y, '#ff0000'); 
            } 
            else {
                if (now - player.lastShot > player.fireRate) {
                    const spread = (Math.random() - 0.5) * 0.15;
                    const barrelOffset = 30;
                    bullets.push({
                        x: player.x + Math.cos(player.angle) * barrelOffset,
                        y: player.y + Math.sin(player.angle) * barrelOffset,
                        vx: Math.cos(player.angle + spread) * 15,
                        vy: Math.sin(player.angle + spread) * 15,
                        life: 100
                    });
                    player.lastShot = now;
                }
            }
        }

        // 4. Update Bullets
        for (let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i];
            b.x += b.vx; b.y += b.vy; b.life--;
            if (b.life <= 0 || b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                bullets.splice(i, 1);
            }
        }

        // 5. Update Enemy Bullets
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
            const b = enemyBullets[i];
            b.x += b.vx; b.y += b.vy; b.life--;
            
            const dist = Math.hypot(player.x - b.x, player.y - b.y);
            if (dist < 20) {
                player.hp--;
                createExplosion(b.x, b.y, '#ff0000');
                enemyBullets.splice(i, 1);
                continue;
            }

            if (b.life <= 0 || b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                enemyBullets.splice(i, 1);
            }
        }

        // 6. Update Missiles
        for (let i = missiles.length - 1; i >= 0; i--) {
            const m = missiles[i];
            m.life--;
            
            if (m.activeDelay > 0) {
                m.activeDelay--;
            } else if (m.target && m.target.hp > 0) {
                const targetAngle = Math.atan2(m.target.y - m.y, m.target.x - m.x);
                m.vx = Math.cos(targetAngle) * m.speed;
                m.vy = Math.sin(targetAngle) * m.speed;
                m.angle = targetAngle;
            }

            m.x += m.vx;
            m.y += m.vy;

            particles.push({
                x: m.x - Math.cos(m.angle) * 8,
                y: m.y - Math.sin(m.angle) * 8,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2,
                life: 0.6,
                color: Math.random() > 0.5 ? '#ff8800' : '#888888'
            });

            let hit = false;
            for (let j = enemies.length - 1; j >= 0; j--) {
                const e = enemies[j];
                const dist = Math.hypot(e.x - m.x, e.y - m.y);
                
                if (dist < 24) {
                    e.hp -= 3;
                    createExplosion(m.x, m.y, '#ffff00');
                    createExplosion(m.x, m.y, '#ff0000');
                    missiles.splice(i, 1);
                    hit = true;
                    
                    if (e.hp <= 0) {
                        createExplosion(e.x, e.y, '#ff4400');
                        enemies.splice(j, 1);
                        score++;
                        scoreDisplay.innerText = `Kills: ${score}`;
                    }
                    break;
                }
            }

            if (!hit && (m.life <= 0 || m.x < 0 || m.x > canvas.width || m.y < 0 || m.y > canvas.height)) {
                missiles.splice(i, 1);
            }
        }

        // 7. Update Enemies
        for (let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i];
            
            e.angle = Math.atan2(player.y - e.y, player.x - e.x);
            e.x += Math.cos(e.angle) * e.speed;
            e.y += Math.sin(e.angle) * e.speed;

            if (now - e.lastShot > e.fireRate) {
                const spread = (Math.random() - 0.5) * 0.2;
                enemyBullets.push({
                    x: e.x + Math.cos(e.angle) * 30,
                    y: e.y + Math.sin(e.angle) * 30,
                    vx: Math.cos(e.angle + spread) * 6,
                    vy: Math.sin(e.angle + spread) * 6,
                    life: 200
                });
                e.lastShot = now;
            }

            for (let j = bullets.length - 1; j >= 0; j--) {
                const b = bullets[j];
                const dist = Math.hypot(e.x - b.x, e.y - b.y);
                
                if (dist < 24) {
                    e.hp--;
                    createExplosion(b.x, b.y, '#ff8800');
                    bullets.splice(j, 1);
                    
                    if (e.hp <= 0) {
                        createExplosion(e.x, e.y, '#ff4400');
                        enemies.splice(i, 1);
                        score++;
                        scoreDisplay.innerText = `Kills: ${score}`;
                        break;
                    }
                }
            }
        }

        // 8. Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx; p.y += p.vy; p.life -= 0.05;
            if (p.life <= 0) particles.splice(i, 1);
        }
    }

    function draw() {
        ctx.fillStyle = '#111518';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = '#1a2226'; ctx.lineWidth = 1;
        for(let i=0; i<canvas.width; i+=40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
        for(let i=0; i<canvas.height; i+=40) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke(); }

        for (const m of missiles) {
            ctx.save();
            ctx.translate(m.x, m.y);
            ctx.rotate(m.angle);
            
            ctx.fillStyle = '#dddddd';
            ctx.fillRect(-8, -3, 16, 6);
            ctx.fillStyle = '#ff3300';
            ctx.fillRect(4, -3, 6, 6);
            ctx.fillStyle = '#777777';
            ctx.fillRect(-8, -5, 4, 10);
            
            ctx.restore();
        }

        for (const b of bullets) {
            ctx.fillStyle = '#ffcc00';
            ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, Math.PI * 2); ctx.fill();
        }
        for (const b of enemyBullets) {
            ctx.fillStyle = '#00ccff';
            ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI * 2); ctx.fill();
        }

        for (const e of enemies) {
            ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(e.angle);
            ctx.drawImage(enemySprite, -32, -32); ctx.restore();
        }

        ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.angle);
        
        if (player.overheated) {
            ctx.translate(Math.random()*4-2, Math.random()*4-2);
            ctx.filter = 'sepia(0.8) hue-rotate(-50px) saturate(3)';
        }
        
        ctx.drawImage(playerSprite, -32, -32);
        ctx.filter = 'none';
        ctx.restore();

        for (const p of particles) {
            ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
            ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1.0;

        // --- UI: Charge Circles ---
        ctx.save();
        ctx.translate(player.x, player.y);

        // 1. Outer Circle (Barrage Charges - 4 sections)
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
        ctx.lineWidth = 6;
        ctx.beginPath(); ctx.arc(0, 0, 40, 0, Math.PI * 2); ctx.stroke(); 

        if (player.burstCount > 0) {
            ctx.strokeStyle = '#00ffff';
            ctx.shadowBlur = 10; ctx.shadowColor = '#00ffff';
            let segmentSize = (Math.PI * 2) / 4; 
            
            ctx.beginPath();
            ctx.arc(0, 0, 40, -Math.PI/2, -Math.PI/2 + (segmentSize * player.burstCount));
            ctx.stroke();
        }

        // 2. Inner Circle (Heat Gauge)
        if (player.overheated) {
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 4;
            ctx.shadowBlur = 20; ctx.shadowColor = '#ff0000';
            ctx.beginPath(); ctx.arc(0, 0, 32, 0, Math.PI * 2); ctx.stroke();
            
            const cooldownProgress = player.cooldownTimer / 3000;
            ctx.strokeStyle = '#ff3333';
            ctx.beginPath(); 
            ctx.arc(0, 0, 32, -Math.PI/2, -Math.PI/2 + (Math.PI * 2 * cooldownProgress));
            ctx.stroke();

        } else if (player.heat > 0) {
            // Give visual feedback when the player hits the >90% sweet spot
            if (player.heat >= 90) {
                ctx.strokeStyle = '#00ffff'; 
                ctx.shadowColor = '#00ffff';
            } else {
                ctx.strokeStyle = '#ffcc00'; 
                ctx.shadowColor = '#ffcc00';
            }
            
            ctx.lineWidth = 4;
            ctx.shadowBlur = 15; 
            ctx.beginPath();
            ctx.arc(0, 0, 32, -Math.PI/2, -Math.PI/2 + (Math.PI * 2 * (player.heat / 100)));
            ctx.stroke();

            // Draw a subtle marker line indicating the 90% threshold point
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.shadowBlur = 0;
            ctx.lineWidth = 2;
            ctx.beginPath();
            let markerAngle = -Math.PI/2 + (Math.PI * 2 * 0.9);
            ctx.arc(0, 0, 32, markerAngle - 0.05, markerAngle + 0.05);
            ctx.stroke();
        }
        
        ctx.restore();

        // Health Bar
        ctx.fillStyle = '#333';
        ctx.fillRect(20, 80, 104, 14);
        ctx.fillStyle = '#ff3333';
        ctx.fillRect(22, 82, 100 * (player.hp / player.maxHp), 10);
        ctx.strokeStyle = '#000';
        ctx.strokeRect(20, 80, 104, 14);
        ctx.fillStyle = '#fff';
        ctx.font = '10px Arial';
        ctx.fillText(`HP: ${player.hp}/${player.maxHp}`, 24, 90);
        
        if (player.hp <= 0) {
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = '#ff0000';
            ctx.font = '60px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2);
            ctx.fillStyle = '#fff';
            ctx.font = '20px Arial';
            ctx.fillText('Refresh to Restart', canvas.width/2, canvas.height/2 + 40);
        }
    }

    function gameLoop() {
        if (player.hp > 0) {
            update();
        }
        draw();
        requestAnimationFrame(gameLoop);
    }

    gameLoop();

</script>
</body>
</html>
