<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border Tanks - Heat Mechanics</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0c;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-shadow: 2px 2px 0 #000;
            z-index: 10;
        }
        h1 {
            margin: 0 0 5px 0;
            font-size: 24px;
            color: #7ca8d9;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p { margin: 0; font-size: 14px; color: #aaa; }
        canvas { 
            display: block; 
            flex-grow: 1; /* Takes up remaining space above dashboard */
        }

        /* --- TACTICAL DASHBOARD STYLES --- */
        #dashboard {
            height: 120px;
            background-color: #111518;
            border-top: 4px solid #1a2226;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
            position: relative;
            z-index: 20;
        }
        .dash-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .left-panel, .right-panel { width: 20%; }
        .center-panel { width: 50%; align-items: center; }

        /* Left Panel - HP & Stats */
        .stat-label { font-size: 12px; color: #777; letter-spacing: 1px; margin-bottom: 4px; }
        .stat-value { font-size: 20px; font-weight: bold; color: #fff; margin-bottom: 10px; }
        #dash-hp-bg { width: 100%; height: 12px; background: #222; border: 1px solid #000; margin-bottom: 5px; }
        #dash-hp-fill { height: 100%; background: #ff3333; width: 100%; transition: width 0.2s; }
        
        /* Center Panel - Heat Bar */
        #heat-status-text {
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 8px;
            text-transform: uppercase;
            color: #ffcc00;
        }
        #dash-heat-container {
            width: 100%;
            height: 30px;
            background: #0a0a0c;
            border: 2px solid #333;
            position: relative;
            box-shadow: inset 0 0 10px #000;
        }
        #dash-heat-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ffcc00, #ff8800);
            transition: width 0.05s linear, background-color 0.1s;
        }
        /* The 90% Target Marker */
        #dash-heat-target {
            position: absolute;
            left: 90%;
            top: -5px;
            bottom: -5px;
            width: 4px;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 8px #fff;
            z-index: 2;
        }
        #target-label {
            position: absolute;
            left: 90%;
            top: -20px;
            transform: translateX(-50%);
            font-size: 10px;
            color: #fff;
            letter-spacing: 1px;
        }

        /* Right Panel - Barrage Charges */
        .charge-container {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }
        .charge-node {
            width: 30px;
            height: 30px;
            background: #222;
            border: 2px solid #444;
            transform: skewX(-15deg);
            transition: all 0.3s;
        }
        .charge-node.filled {
            background: #00ffff;
            border-color: #fff;
            box-shadow: 0 0 15px #00ffff;
        }
        
        /* Utility */
        .warning-flash { animation: flash 0.5s infinite alternate; }
        @keyframes flash {
            0% { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
            100% { color: #fff; text-shadow: 0 0 20px #ff0000; }
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>Steel Vanguard</h1>
        <p>Movement: <b>W A S D</b> | Aim: <b>Mouse</b> | Minigun: <b>Left Click</b></p>
        <p style="color: #7ca8d9; margin-top: 5px;">Monitor the dashboard below. Release fire at 90% to build barrage nodes.</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="dashboard">
        <div class="dash-panel left-panel">
            <div class="stat-label">HULL INTEGRITY</div>
            <div id="dash-hp-bg"><div id="dash-hp-fill"></div></div>
            <div class="stat-value" id="dash-hp-text">10/10</div>
            
            <div class="stat-label" style="margin-top: 5px;">TARGETS DESTROYED</div>
            <div class="stat-value" style="color: #ffcc00;" id="dash-kills-text">0</div>
        </div>

        <div class="dash-panel center-panel">
            <div id="heat-status-text">SYSTEM NOMINAL</div>
            <div id="dash-heat-container">
                <div id="dash-heat-fill"></div>
                <div id="dash-heat-target"></div>
                <div id="target-label">90%</div>
            </div>
        </div>

        <div class="dash-panel right-panel" style="align-items: flex-end;">
            <div class="stat-label">BARRAGE NODES (4 REQUIRED)</div>
            <div class="charge-container">
                <div class="charge-node" id="node-1"></div>
                <div class="charge-node" id="node-2"></div>
                <div class="charge-node" id="node-3"></div>
                <div class="charge-node" id="node-4"></div>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // DOM Elements for Dashboard
    const domHpFill = document.getElementById('dash-hp-fill');
    const domHpText = document.getElementById('dash-hp-text');
    const domKillsText = document.getElementById('dash-kills-text');
    const domHeatFill = document.getElementById('dash-heat-fill');
    const domHeatStatus = document.getElementById('heat-status-text');
    const domNodes = [
        document.getElementById('node-1'),
        document.getElementById('node-2'),
        document.getElementById('node-3'),
        document.getElementById('node-4')
    ];

    function resize() {
        canvas.width = window.innerWidth;
        // Adjust height to leave room for the 120px dashboard
        canvas.height = window.innerHeight - 120; 
    }
    window.addEventListener('resize', resize);
    resize();

    // --- SPRITE GENERATION ---
    function generateTankSprite(hullColor, accentColor) {
        const offscreen = document.createElement('canvas');
        offscreen.width = 64;
        offscreen.height = 64;
        const c = offscreen.getContext('2d');

        c.fillStyle = '#1a1a1a';
        c.fillRect(8, 6, 48, 14);
        c.fillRect(8, 44, 48, 14);
        
        c.fillStyle = '#0a0a0a';
        for(let i = 10; i < 54; i += 6) {
            c.fillRect(i, 6, 4, 14);
            c.fillRect(i, 44, 4, 14);
        }

        c.fillStyle = hullColor;
        c.fillRect(14, 14, 36, 36);
        
        c.fillStyle = accentColor;
        c.fillRect(20, 20, 24, 24);
        c.strokeStyle = '#000';
        c.lineWidth = 2;
        c.strokeRect(14, 14, 36, 36);

        c.fillStyle = '#333';
        c.beginPath();
        c.arc(32, 32, 14, 0, Math.PI * 2);
        c.fill();
        c.stroke();

        c.fillStyle = '#111';
        c.fillRect(32, 26, 28, 4);
        c.fillRect(32, 34, 28, 4);
        c.fillStyle = '#222';
        c.fillRect(32, 30, 30, 4);

        return offscreen;
    }

    const playerSprite = generateTankSprite('#5a7282', '#3e515e');
    const enemySprite = generateTankSprite('#825a5a', '#5e3e3e');

    // --- GAME STATE ---
    let score = 0;
    const keys = {};
    const mouse = { x: canvas.width/2, y: canvas.height/2, down: false };

    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
    // Adjust mouse tracking to match canvas position relative to window
    window.addEventListener('mousemove', e => { 
        mouse.x = e.clientX; 
        mouse.y = e.clientY; // Canvas is at top: 0, so clientY is accurate
    });
    window.addEventListener('mousedown', e => { if(e.button === 0 && e.clientY < canvas.height) mouse.down = true; });
    window.addEventListener('mouseup', e => { 
        if(e.button === 0) {
            if(!player.overheated) {
                handleChargeRelease();
            }
            mouse.down = false; 
        }
    });

    // Entities
    const bullets = [];
    const enemyBullets = [];
    const enemies = [];
    const particles = [];
    const missiles = [];

    // Player Object
    const player = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        speed: 3,
        angle: 0,
        lastShot: 0,
        fireRate: 80,
        hp: 10,
        maxHp: 10,
        
        heat: 0,
        overheated: false,
        cooldownTimer: 0,
        burstCount: 0 
    };

    // --- GAME FUNCTIONS ---

    function spawnEnemy() {
        let ex, ey;
        if (Math.random() < 0.5) {
            ex = Math.random() < 0.5 ? -50 : canvas.width + 50;
            ey = Math.random() * canvas.height;
        } else {
            ex = Math.random() * canvas.width;
            ey = Math.random() < 0.5 ? -50 : canvas.height + 50;
        }

        enemies.push({
            x: ex, y: ey,
            speed: 1.5 + Math.random() * 0.5,
            hp: 3,
            angle: 0,
            lastShot: Date.now() + Math.random() * 2000,
            fireRate: 1800
        });
    }

    setInterval(spawnEnemy, 1500);

    function createExplosion(x, y, color) {
        for(let i=0; i<15; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 8,
                vy: (Math.random() - 0.5) * 8,
                life: 1.0,
                color: color
            });
        }
    }

    function handleChargeRelease() {
        if (player.heat >= 90 && player.heat < 100) {
            player.burstCount++;
            createExplosion(player.x, player.y, '#00ffff'); 

            if (player.burstCount >= 4) {
                player.burstCount = 0; 
                fireMissileBarrage(); 
            }
        }
        if (!player.overheated) {
            player.heat = 0;
        }
    }

    function fireMissileBarrage() {
        for (let i = 0; i < enemies.length; i++) {
            const bloomAngle = player.angle + (Math.random() - 0.5) * Math.PI;
            
            missiles.push({
                x: player.x,
                y: player.y,
                vx: Math.cos(bloomAngle) * 4,
                vy: Math.sin(bloomAngle) * 4,
                speed: 8,
                angle: bloomAngle,
                target: enemies[i],
                life: 200,
                activeDelay: 10 
            });
        }
        for(let i=0; i<30; i++) {
            createExplosion(player.x, player.y, '#ff8800');
        }
    }

    function update() {
        const now = Date.now();

        // Movement
        let dx = 0, dy = 0;
        if (keys['w']) dy -= 1;
        if (keys['s']) dy += 1;
        if (keys['a']) dx -= 1;
        if (keys['d']) dx += 1;

        if (dx !== 0 && dy !== 0) {
            const length = Math.sqrt(dx*dx + dy*dy);
            dx /= length; dy /= length;
        }

        player.x += dx * player.speed;
        player.y += dy * player.speed;
        player.x = Math.max(32, Math.min(canvas.width - 32, player.x));
        player.y = Math.max(32, Math.min(canvas.height - 32, player.y));
        player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

        // Overheat Logic
        if (player.overheated) {
            player.cooldownTimer -= 16.67; 
            if (player.cooldownTimer <= 0) {
                player.overheated = false;
                player.heat = 0; 
            }
        }

        // Shooting
        if (mouse.down && !player.overheated) {
            player.heat += 0.555; 
            
            if (player.heat >= 100) {
                player.heat = 100;
                player.overheated = true;
                player.cooldownTimer = 3000; 
                player.burstCount = 0; 
                createExplosion(player.x, player.y, '#ff0000'); 
            } 
            else {
                if (now - player.lastShot > player.fireRate) {
                    const spread = (Math.random() - 0.5) * 0.15;
                    const barrelOffset = 30;
                    bullets.push({
                        x: player.x + Math.cos(player.angle) * barrelOffset,
                        y: player.y + Math.sin(player.angle) * barrelOffset,
                        vx: Math.cos(player.angle + spread) * 15,
                        vy: Math.sin(player.angle + spread) * 15,
                        life: 100
                    });
                    player.lastShot = now;
                }
            }
        }

        // Update Projectiles & Entities (Code condensed for brevity)
        for (let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i];
            b.x += b.vx; b.y += b.vy; b.life--;
            if (b.life <= 0 || b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
        }

        for (let i = enemyBullets.length - 1; i >= 0; i--) {
            const b = enemyBullets[i];
            b.x += b.vx; b.y += b.vy; b.life--;
            if (Math.hypot(player.x - b.x, player.y - b.y) < 20) {
                player.hp--; createExplosion(b.x, b.y, '#ff0000'); enemyBullets.splice(i, 1); continue;
            }
            if (b.life <= 0 || b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) enemyBullets.splice(i, 1);
        }

        for (let i = missiles.length - 1; i >= 0; i--) {
            const m = missiles[i];
            m.life--;
            if (m.activeDelay > 0) m.activeDelay--;
            else if (m.target && m.target.hp > 0) {
                const targetAngle = Math.atan2(m.target.y - m.y, m.target.x - m.x);
                m.vx = Math.cos(targetAngle) * m.speed; m.vy = Math.sin(targetAngle) * m.speed; m.angle = targetAngle;
            }
            m.x += m.vx; m.y += m.vy;
            particles.push({ x: m.x - Math.cos(m.angle)*8, y: m.y - Math.sin(m.angle)*8, vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2, life: 0.6, color: Math.random() > 0.5 ? '#ff8800' : '#888888' });

            let hit = false;
            for (let j = enemies.length - 1; j >= 0; j--) {
                const e = enemies[j];
                if (Math.hypot(e.x - m.x, e.y - m.y) < 24) {
                    e.hp -= 3;
                    createExplosion(m.x, m.y, '#ffff00'); createExplosion(m.x, m.y, '#ff0000');
                    missiles.splice(i, 1); hit = true;
                    if (e.hp <= 0) {
                        createExplosion(e.x, e.y, '#ff4400'); enemies.splice(j, 1); score++;
                    }
                    break;
                }
            }
            if (!hit && (m.life <= 0 || m.x < 0 || m.x > canvas.width || m.y < 0 || m.y > canvas.height)) missiles.splice(i, 1);
        }

        for (let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i];
            e.angle = Math.atan2(player.y - e.y, player.x - e.x);
            e.x += Math.cos(e.angle) * e.speed; e.y += Math.sin(e.angle) * e.speed;

            if (now - e.lastShot > e.fireRate) {
                const spread = (Math.random() - 0.5) * 0.2;
                enemyBullets.push({ x: e.x + Math.cos(e.angle)*30, y: e.y + Math.sin(e.angle)*30, vx: Math.cos(e.angle+spread)*6, vy: Math.sin(e.angle+spread)*6, life: 200 });
                e.lastShot = now;
            }

            for (let j = bullets.length - 1; j >= 0; j--) {
                const b = bullets[j];
                if (Math.hypot(e.x - b.x, e.y - b.y) < 24) {
                    e.hp--; createExplosion(b.x, b.y, '#ff8800'); bullets.splice(j, 1);
                    if (e.hp <= 0) {
                        createExplosion(e.x, e.y, '#ff4400'); enemies.splice(i, 1); score++; break;
                    }
                }
            }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx; p.y += p.vy; p.life -= 0.05;
            if (p.life <= 0) particles.splice(i, 1);
        }
    }

    // --- DASHBOARD UPDATE ---
    function updateDashboard() {
        // HP & Kills
        domHpText.innerText = `${Math.max(0, player.hp)}/${player.maxHp}`;
        domHpFill.style.width = `${(Math.max(0, player.hp) / player.maxHp) * 100}%`;
        domKillsText.innerText = score;

        // Heat Bar Logic
        let displayHeat = player.heat;
        if (player.overheated) {
            displayHeat = (player.cooldownTimer / 3000) * 100;
            domHeatFill.style.background = '#ff0000';
            domHeatStatus.innerText = "CRITICAL OVERHEAT - WEAPON LOCKED";
            domHeatStatus.style.color = "#ff0000";
            domHeatStatus.classList.add('warning-flash');
        } else {
            domHeatStatus.classList.remove('warning-flash');
            if (player.heat >= 90) {
                domHeatFill.style.background = '#00ffff';
                domHeatFill.style.boxShadow = '0 0 15px #00ffff';
                domHeatStatus.innerText = "OPTIMAL CHARGE REACHED!";
                domHeatStatus.style.color = "#00ffff";
            } else if (player.heat > 0) {
                domHeatFill.style.background = 'linear-gradient(90deg, #ffcc00, #ff8800)';
                domHeatFill.style.boxShadow = 'none';
                domHeatStatus.innerText = "HEATING MINIGUN...";
                domHeatStatus.style.color = "#ffcc00";
            } else {
                domHeatFill.style.boxShadow = 'none';
                domHeatStatus.innerText = "SYSTEM NOMINAL";
                domHeatStatus.style.color = "#777";
            }
        }
        domHeatFill.style.width = `${displayHeat}%`;

        // Nodes Logic
        for (let i = 0; i < 4; i++) {
            if (i < player.burstCount) {
                domNodes[i].classList.add('filled');
            } else {
                domNodes[i].classList.remove('filled');
            }
        }
    }

    function draw() {
        // Canvas Draw (Game World Only)
        ctx.fillStyle = '#111518';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = '#1a2226'; ctx.lineWidth = 1;
        for(let i=0; i<canvas.width; i+=40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
        for(let i=0; i<canvas.height; i+=40) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke(); }

        for (const m of missiles) {
            ctx.save(); ctx.translate(m.x, m.y); ctx.rotate(m.angle);
            ctx.fillStyle = '#dddddd'; ctx.fillRect(-8, -3, 16, 6);
            ctx.fillStyle = '#ff3300'; ctx.fillRect(4, -3, 6, 6);
            ctx.fillStyle = '#777777'; ctx.fillRect(-8, -5, 4, 10);
            ctx.restore();
        }

        for (const b of bullets) {
            ctx.fillStyle = '#ffcc00'; ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, Math.PI * 2); ctx.fill();
        }
        for (const b of enemyBullets) {
            ctx.fillStyle = '#00ccff'; ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI * 2); ctx.fill();
        }

        for (const e of enemies) {
            ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(e.angle); ctx.drawImage(enemySprite, -32, -32); ctx.restore();
        }

        ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.angle);
        if (player.overheated) {
            ctx.translate(Math.random()*4-2, Math.random()*4-2);
            ctx.filter = 'sepia(0.8) hue-rotate(-50px) saturate(3)';
        }
        ctx.drawImage(playerSprite, -32, -32);
        ctx.filter = 'none';
        ctx.restore();

        for (const p of particles) {
            ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1.0;

        // Game Over Overlay
        if (player.hp <= 0) {
            ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = '#ff0000'; ctx.font = '60px Arial'; ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2);
            ctx.fillStyle = '#fff'; ctx.font = '20px Arial';
            ctx.fillText('Refresh to Restart', canvas.width/2, canvas.height/2 + 40);
        }
    }

    function gameLoop() {
        if (player.hp > 0) {
            update();
            updateDashboard(); // Call UI sync every frame
        }
        draw();
        requestAnimationFrame(gameLoop);
    }

    gameLoop();

</script>
</body>
</html>
